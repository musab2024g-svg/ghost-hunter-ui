<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ConvertIQ | Premium Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { background: #030408; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-panel { background: rgba(13, 17, 28, 0.9); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .gauge-text { background: linear-gradient(180deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-border { border: 1px solid rgba(139, 92, 246, 0.3); box-shadow: 0 0 15px rgba(139, 92, 246, 0.1); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 pt-10">
        
        <div class="space-y-8">
            <div class="text-xs font-bold text-purple-400 uppercase tracking-widest">AI Conversion Leak Detector</div>
            <h1 class="text-6xl font-black leading-tight tracking-tighter">Losing Customers.<br><span class="text-purple-500 italic">Fixing Leaks.</span></h1>
            <p class="text-slate-400 text-lg">ConvertIQ scans your store in seconds and reveals exactly why your conversions are dropping.</p>
            
            <div class="flex flex-col gap-4 max-w-md">
                <input id="targetUrl" type="text" placeholder="Enter Store URL (e.g. mystore.com)" class="bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-purple-500 text-cyan-400 font-bold">
                <button onclick="runAudit()" class="bg-gradient-to-r from-purple-600 to-blue-600 p-5 rounded-2xl font-black uppercase italic hover:scale-105 transition-all">Analyze My Store →</button>
            </div>
        </div>

        <div id="dashboard" class="glass-panel p-8 space-y-8 min-h-[600px] relative overflow-hidden">
            <div id="placeholder" class="absolute inset-0 flex items-center justify-center text-slate-700 font-bold italic opacity-20">PENDING ANALYSIS...</div>
            
            <div id="results" class="hidden space-y-8 animate-in fade-in duration-500">
                <div class="flex justify-between items-center border-b border-white/5 pb-4">
                    <div class="text-sm font-bold opacity-60 uppercase" id="audit-url">MYSTORE.COM</div>
                    <div class="text-[10px] bg-purple-500/10 text-purple-400 px-3 py-1 rounded-full border border-purple-500/20 uppercase font-black">Live Report</div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white/5 p-6 rounded-3xl text-center">
                        <div class="text-[10px] uppercase opacity-40 mb-2">Conversion Score</div>
                        <div class="text-4xl font-black text-purple-400" id="score">0%</div>
                    </div>
                    <div class="bg-white/5 p-6 rounded-3xl text-center border-l-4 border-pink-500">
                        <div class="text-[10px] uppercase opacity-40 mb-2">Revenue Lost</div>
                        <div class="text-3xl font-black text-white" id="loss">$0</div>
                    </div>
                    <div class="bg-white/5 p-6 rounded-3xl text-center">
                        <div class="text-[10px] uppercase opacity-40 mb-2">Issues Found</div>
                        <div class="text-4xl font-black text-cyan-400" id="issues">0</div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="text-xs font-bold uppercase opacity-60">Critical Conversion Leaks</div>
                    <div id="report-text" class="text-sm leading-relaxed text-slate-300 bg-black/40 p-6 rounded-3xl border border-white/5 whitespace-pre-line italic">
                    </div>
                </div>
                
                <button class="w-full py-4 bg-white text-black font-black uppercase rounded-2xl italic">Download Enterprise PDF Report</button>
            </div>
        </div>
    </div>

    <script>
        async function runAudit() {
            const url = document.getElementById('targetUrl').value;
            if(!url) return;
            
            document.getElementById('placeholder').innerText = "QUERYING CORE INTELLIGENCE...";
            
            try {
                const res = await fetch(`https://mg-nexus-radar.onrender.com/api/analyze?url=${url}`);
                const data = await res.json();
                
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
                
                document.getElementById('audit-url').innerText = url.toUpperCase();
                document.getElementById('score').innerText = data.score + "%";
                document.getElementById('loss').innerText = data.loss + "/mo";
                document.getElementById('issues').innerText = data.issues;
                document.getElementById('report-text').innerText = data.report;
            } catch (e) {
                alert("السيرفر يحتاج دقيقة ليستيقظ. حاول مرة أخرى.");
            }
        }
    </script>
</body>
</html>
