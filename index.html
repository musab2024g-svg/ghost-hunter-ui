<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NEXUS STUDIO | The Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* إجبار اللون الأسود العميق */
        body { background-color: #02040a !important; color: #ffffff; font-family: 'Inter', sans-serif; }
        .magnates-card { background: rgba(10, 15, 25, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        .glow-cyan { box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); }
        .gradient-text { background: linear-gradient(90deg, #8b5cf6, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-16 border-b border-white/5 pb-6">
            <div class="text-3xl font-black italic tracking-tighter uppercase">NEXUS <span class="text-cyan-400">STUDIO</span></div>
            <div class="text-[10px] mono text-cyan-500 bg-cyan-500/10 px-4 py-2 rounded-full font-bold border border-cyan-500/20">CINEMATIC CORE v5.0</div>
        </header>

        <main class="space-y-12">
            <section class="text-center space-y-4">
                <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight leading-none">إمبراطورية <span class="gradient-text">الإنتاج الآلي</span></h1>
                <p class="text-slate-500 text-lg max-w-2xl mx-auto font-medium">حول أي فيديو رياضي إلى وثائقي سينمائي غامض بأسلوب MagnatesMedia في ثوانٍ.</p>
            </section>

            <div class="magnates-card p-4 rounded-3xl flex flex-col md:flex-row gap-4 shadow-2xl glow-cyan">
                <input id="ytUrl" type="text" placeholder="ضع رابط الفيديو المنافس هنا..." 
                       class="flex-1 bg-black/50 text-cyan-400 font-bold px-8 py-5 rounded-2xl outline-none border border-white/5 focus:border-cyan-500 transition-all placeholder-slate-700">
                <button onclick="startProduction()" class="bg-gradient-to-r from-purple-600 to-cyan-600 text-white px-12 py-5 rounded-2xl font-black uppercase italic text-sm tracking-widest hover:scale-[1.02] transition-all">إطلاق الوحش 🚀</button>
            </div>

            <div id="output-box" class="hidden space-y-8 animate-in fade-in duration-1000">
                <div class="magnates-card p-10 rounded-[40px] border-t-4 border-cyan-500">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                        <span class="w-2 h-6 bg-cyan-500 rounded-full"></span> سكريبت "نكسس" السينمائي
                    </h3>
                    <div id="script-content" class="text-slate-300 leading-relaxed text-lg whitespace-pre-line bg-black/40 p-8 rounded-3xl border border-white/5 italic"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function startProduction() {
            const url = document.getElementById('ytUrl').value;
            if(!url) return;
            
            document.getElementById('output-box').classList.remove('hidden');
            document.getElementById('script-content').innerHTML = "<span class='animate-pulse text-cyan-500 mono uppercase'>جاري تحليل العظمة... يرجى الانتظار</span>";

            try {
                const res = await fetch(`https://mg-nexus-radar.onrender.com/api/generate-studio?url=${url}`);
                const data = await res.json();
                document.getElementById('script-content').innerText = data.script;
            } catch (e) {
                alert("تأكد من أن Render يعمل باللون الأخضر.");
            }
        }
    </script>
</body>
</html>
