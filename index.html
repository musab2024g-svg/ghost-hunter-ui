<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NEXUS STUDIO | The Dark Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030408; color: #ffffff; font-family: sans-serif; }
        .studio-card { background: rgba(10, 15, 25, 0.9); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-cyan { box-shadow: 0 0 30px rgba(6, 182, 212, 0.15); }
        .gradient-btn { background: linear-gradient(90deg, #8b5cf6, #06b6d4); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-16">
            <div class="text-3xl font-black italic tracking-tighter uppercase mb-2">NEXUS <span class="text-cyan-400">STUDIO</span></div>
            <p class="text-slate-500 text-xs font-bold tracking-[0.3em] uppercase">Cinematic Automation Engine</p>
        </header>

        <div class="studio-card p-4 rounded-3xl flex flex-col md:flex-row gap-4 mb-12 glow-cyan">
            <input id="ytUrl" type="text" placeholder="انسخ رابط فيديو يوتيوب هنا..." 
                   class="flex-1 bg-black/50 text-cyan-400 font-bold px-8 py-5 rounded-2xl outline-none border border-white/5 focus:border-cyan-500 transition-all">
            <button onclick="generateVideo()" class="gradient-btn text-white px-10 py-5 rounded-2xl font-black uppercase italic text-sm tracking-widest hover:scale-105 transition-all shadow-lg">إطلاق الإنتاج 🚀</button>
        </div>

        <div id="output-area" class="hidden space-y-8 animate-in fade-in duration-700">
            <div class="studio-card p-10 rounded-[40px] border-t-4 border-cyan-500">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                    <span class="w-2 h-6 bg-cyan-500 rounded-full"></span> السكريبت السينمائي (بأسلوب MagnatesMedia)
                </h3>
                <div id="script-box" class="text-slate-300 leading-loose text-lg whitespace-pre-line italic bg-black/40 p-8 rounded-3xl border border-white/5">
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generateVideo() {
            const url = document.getElementById('ytUrl').value;
            if(!url) return;
            
            document.getElementById('output-area').classList.remove('hidden');
            document.getElementById('script-box').innerHTML = "<span class='animate-pulse text-cyan-500'>جاري استدعاء العقل المركزي...</span>";

            try {
                const res = await fetch(`https://mg-nexus-radar.onrender.com/api/generate-studio?url=${url}`);
                const data = await res.json();
                document.getElementById('script-box').innerText = data.script;
            } catch (e) {
                alert("السيرفر نائم.. تأكد من تشغيل Render باللون الأخضر.");
            }
        }
    </script>
</body>
</html>
