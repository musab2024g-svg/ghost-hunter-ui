<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>NEXUS STUDIO | YouTube Automator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .glow-btn { background: linear-gradient(90deg, #8b5cf6, #06b6d4); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-black italic tracking-tighter">NEXUS <span class="text-cyan-400">STUDIO</span></h1>
            <p class="text-slate-500 mt-2 uppercase text-[10px] tracking-widest">AI Video Production Core</p>
        </header>

        <div class="glass p-8 rounded-3xl mb-8">
            <label class="block text-xs font-bold text-slate-400 mb-4 uppercase">رابط يوتيوب المصدر (المنافس)</label>
            <div class="flex gap-4">
                <input id="ytUrl" type="text" placeholder="https://youtube.com/..." class="flex-1 bg-black border border-white/10 p-4 rounded-xl outline-none focus:border-cyan-500 text-cyan-400 mono">
                <button onclick="launchProduction()" class="glow-btn px-8 py-4 rounded-xl font-black uppercase text-xs italic">إطلاق الإنتاج 🚀</button>
            </div>
        </div>

        <div id="studio-output" class="hidden space-y-8">
            <div class="glass p-8 rounded-3xl">
                <h3 class="text-cyan-400 font-bold mb-4">السكريبت السينمائي المولد (أسلوب MagnatesMedia)</h3>
                <div id="final-script" class="text-sm leading-loose text-slate-300 whitespace-pre-line bg-black/40 p-6 rounded-xl border border-white/5"></div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-2xl border-l-4 border-purple-500">
                    <div class="text-[10px] text-slate-500 mb-2">الصوت (ElevenLabs)</div>
                    <div class="text-xs font-bold">الحالة: جاهز للإرسال</div>
                </div>
                <div class="glass p-6 rounded-2xl border-l-4 border-cyan-500">
                    <div class="text-[10px] text-slate-500 mb-2">الصور (Nano Banana Pro)</div>
                    <div class="text-xs font-bold">الحالة: بانتظار الأوامر</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function launchProduction() {
            const url = document.getElementById('ytUrl').value;
            document.getElementById('studio-output').classList.remove('hidden');
            document.getElementById('final-script').innerText = "جاري تحليل الفيديو وإعادة كتابة التاريخ... انتظر السحر.";

            try {
                const res = await fetch(`https://mg-nexus-radar.onrender.com/api/generate-studio?url=${url}`);
                const data = await res.json();
                document.getElementById('final-script').innerText = data.script;
            } catch (e) {
                alert("السيرفر مشغول حالياً. تأكد من تشغيل Render.");
            }
        }
    </script>
</body>
</html>
